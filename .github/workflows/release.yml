name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-2022
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
      ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist:win -- --publish never

      - name: Build Android APK
        run: npm run android:debug

      - name: Collect release assets
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Copy-Item "dist-installer/AccountingManagement-Setup-*.exe" "release-assets/" -Force
          $apk = Get-ChildItem "android/app/build/outputs/apk" -Filter "*.apk" -Recurse | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          Copy-Item $apk.FullName "release-assets/AccountingManagement-Android-v$version.apk" -Force
          Copy-Item "INSTALL.txt" "release-assets/INSTALL.txt" -Force
          Compress-Archive -Path "release-assets/*" -DestinationPath "AccountingManagement_V$version`_release.zip" -Force

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-installer/AccountingManagement-Setup-*.exe
            release-assets/AccountingManagement-Android-*.apk
            AccountingManagement_V*_release.zip
          generate_release_notes: true
